[build]
  # Regenerates data/news.json from _posts/news/*.md before every deploy
  command = "node build.js"
  publish = "."

# Redirect /admin to the CMS panel
[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
